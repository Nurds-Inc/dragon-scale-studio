# SPECIAL CASE: Development deployment with git-sync for live preview
# This is a ONE-OFF pattern for Dragon Scale Studio development.
# NOT a standard - prefer sandboxctl for typical preview workflows.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dragon-scale-studio-dev
  namespace: dragon-scale-studio-dev
  labels:
    app.kubernetes.io/name: dragon-scale-studio-dev
    app.kubernetes.io/component: frontend
    app.kubernetes.io/environment: development
spec:
  replicas: 1
  revisionHistoryLimit: 2
  strategy:
    type: Recreate  # Dev environment, don't need rolling updates
  selector:
    matchLabels:
      app.kubernetes.io/name: dragon-scale-studio-dev
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dragon-scale-studio-dev
        app.kubernetes.io/component: frontend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532  # nonroot user
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      
      # Shared volume for git-sync and app
      volumes:
      - name: repo
        emptyDir: {}
      - name: cache
        emptyDir: {}
      - name: tmp
        emptyDir: {}
      
      # Init container to do initial clone
      initContainers:
      - name: git-clone
        image: registry.k8s.io/git-sync/git-sync:v4.2.4
        args:
          - --repo=https://github.com/Nurds-Inc/dragon-scale-studio.git
          - --branch=main
          - --root=/repo
          - --one-time
        volumeMounts:
        - name: repo
          mountPath: /repo
        - name: tmp
          mountPath: /tmp
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
      
      containers:
      # Git-sync sidecar - pulls updates every 10s
      - name: git-sync
        image: registry.k8s.io/git-sync/git-sync:v4.2.4
        args:
          - --repo=https://github.com/Nurds-Inc/dragon-scale-studio.git
          - --branch=main
          - --root=/repo
          - --period=10s
          - --max-failures=3
        volumeMounts:
        - name: repo
          mountPath: /repo
        - name: tmp
          mountPath: /tmp
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi
      
      # Dev server container
      - name: app
        image: oven/bun:1.1-alpine
        workingDir: /repo/dragon-scale-studio.git
        command:
          - /bin/sh
          - -c
          - |
            set -e
            echo "Installing dependencies..."
            bun install
            echo "Starting dev server..."
            exec bun run dev --host :: --port 8080
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        
        env:
        - name: NODE_ENV
          value: development
        
        resources:
          requests:
            cpu: 500m
            memory: 2Gi
          limits:
            cpu: 4
            memory: 8Gi  # Higher limit for dev server + HMR
        
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false  # Dev needs write for node_modules
          capabilities:
            drop:
            - ALL
        
        readinessProbe:
          httpGet:
            path: /
            port: http
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 6
        
        livenessProbe:
          httpGet:
            path: /
            port: http
            scheme: HTTP
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
        
        volumeMounts:
        - name: repo
          mountPath: /repo
        - name: cache
          mountPath: /tmp
