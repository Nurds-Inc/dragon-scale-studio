# Sandbox configuration for Dragon Scale Studio
# Enables live preview with automatic git sync for development

runtime: node-bun
autostart: true
health_path: /

# Git sync configuration - auto-pull changes from GitHub
sync:
  enabled: true
  branch: main
  interval_seconds: 5
  rebase: true

# Override default command to match vite.config.ts settings
command: |
  bun install && bun run dev -- --host :: --port 8080
